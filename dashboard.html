<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dashboard — adam.dev</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0e0c12;
      color: #f0eaff;
      font-family: 'DM Mono', monospace;
      padding: 24px;
      max-width: 720px;
      margin: 0 auto;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 4px; }
    .sub { color: rgba(210,195,240,0.45); font-size: 11px; margin-bottom: 24px; }
    .locked { text-align: center; padding: 60px 20px; }
    .locked input { background: #1a1523; border: 1px solid rgba(220,200,255,0.08); color: #f0eaff; padding: 10px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; width: 100%; max-width: 260px; outline: none; }
    .locked input:focus { border-color: rgba(212,184,255,0.3); }
    .locked .err { color: #e05c5c; font-size: 11px; margin-top: 8px; }
    section { margin-bottom: 28px; }
    h2 { font-family: 'Syne', sans-serif; font-size: 14px; margin-bottom: 10px; color: #d4b8ff; }
    label { display: block; font-size: 10px; color: rgba(210,195,240,0.45); margin-bottom: 4px; }
    input, textarea, select {
      width: 100%;
      background: #1a1523;
      border: 1px solid rgba(220,200,255,0.08);
      color: #f0eaff;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      margin-bottom: 12px;
      outline: none;
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, textarea:focus { border-color: rgba(212,184,255,0.3); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      background: rgba(212,184,255,0.10);
      border: 1px solid rgba(212,184,255,0.20);
      color: #d4b8ff;
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
    }
    .btn:hover { background: rgba(212,184,255,0.18); }
    .btn-primary { background: #d4b8ff; color: #0e0c12; border-color: #d4b8ff; }
    .btn-primary:hover { background: #c4a8ef; }
    .btn-danger { background: rgba(224,92,92,0.12); border-color: rgba(224,92,92,0.25); color: #e05c5c; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { text-align: left; padding: 6px 8px; color: rgba(210,195,240,0.45); border-bottom: 1px solid rgba(220,200,255,0.08); font-weight: 400; }
    td { padding: 6px 8px; border-bottom: 1px solid rgba(220,200,255,0.05); }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 9px; background: rgba(93,186,126,0.12); color: #5dba7e; }
    .empty { color: rgba(210,195,240,0.3); font-size: 11px; text-align: center; padding: 20px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1523; border: 1px solid rgba(220,200,255,0.08); padding: 10px 18px; border-radius: 8px; font-size: 11px; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .back { display: inline-block; margin-bottom: 16px; color: rgba(210,195,240,0.45); font-size: 11px; text-decoration: none; }
    .back:hover { color: #d4b8ff; }
    .section-toggle { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .section-toggle button { padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(220,200,255,0.08); background: transparent; color: rgba(210,195,240,0.45); font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer; }
    .section-toggle button.active { background: rgba(212,184,255,0.10); color: #d4b8ff; border-color: rgba(212,184,255,0.2); }
    .section-panel { display: none; }
    .section-panel.active { display: block; }
  </style>
</head>
<body>
  <a href="/" class="back">&larr; back to site</a>

  <div id="lockScreen" class="locked">
    <h1>dashboard</h1>
    <div class="sub">manage site content locally</div>
    <input type="password" id="pwdInput" placeholder="enter password" autocomplete="off">
    <div class="err" id="pwdErr"></div>
    <br>
    <button class="btn btn-primary" onclick="unlock()" style="margin-top:8px;">unlock</button>
  </div>

  <div id="dashContent" style="display:none;">
    <h1>dashboard</h1>
    <div class="sub">changes save to your browser — they won't go live until you update the source files</div>

    <div class="section-toggle" id="sectionTabs">
      <button class="active" data-section="profile">Profile</button>
      <button data-section="skills">Skills</button>
      <button data-section="projects">Projects</button>
      <button data-section="now">Now</button>
      <button data-section="blog">Blog</button>
      <button data-section="friends">Friends</button>
    </div>

    <div id="panel-profile" class="section-panel active">
      <h2>Profile</h2>
      <label>Display name</label>
      <input id="fName" value="adam">
      <label>Tagline</label>
      <input id="fTagline" value="17 · dev/designer · lua/python/js">
      <label>About text</label>
      <textarea id="fAbout" rows="4">i build things. web apps, game systems, tools — whatever sticks. i don't follow tutorials for long, i just start and figure it out as i go.</textarea>
      <label>Birthdate</label>
      <input id="fBirthdate" value="2008-09-22">
      <button class="btn btn-primary" onclick="saveProfile()">Save profile</button>
    </div>

    <div id="panel-skills" class="section-panel">
      <h2>Skills</h2>
      <div id="skillsEditor"></div>
      <button class="btn" onclick="addSkill()" style="margin-top:8px;">+ Add skill</button>
      <button class="btn btn-primary" onclick="saveSkills()" style="margin-left:6px;">Save skills</button>
    </div>

    <div id="panel-projects" class="section-panel">
      <h2>Projects</h2>
      <p class="empty">Project editing coming soon — edit index.js directly for now.</p>
    </div>

    <div id="panel-now" class="section-panel">
      <h2>Now / Status</h2>
      <label>Current status</label>
      <input id="fNowStatus" value="building this site">
      <label>Status note</label>
      <textarea id="fNowNote" rows="2">working on the portfolio — adding PWA, blog, guestbook, and a dashboard</textarea>
      <button class="btn btn-primary" onclick="saveNow()">Save status</button>
    </div>

    <div id="panel-blog" class="section-panel">
      <h2>Blog posts</h2>
      <label>New post title</label>
      <input id="fBlogTitle" value="">
      <label>New post body</label>
      <textarea id="fBlogBody" rows="4"></textarea>
      <button class="btn btn-primary" onclick="addBlogPost()">Add post</button>
      <div id="blogList" style="margin-top:16px;"></div>
    </div>

    <div id="panel-friends" class="section-panel">
      <h2>Friends</h2>
      <div id="friendsEditor"></div>
      <button class="btn" onclick="addFriend()" style="margin-top:8px;">+ Add friend</button>
      <button class="btn btn-primary" onclick="saveFriends()" style="margin-left:6px;">Save friends</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const PWD_HASH = "8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92"; // sha256("password")
    let unlockAttempts = 0;

    async function sha256(str) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2500);
    }

    async function unlock() {
      const pwd = document.getElementById("pwdInput").value;
      if (!pwd) { document.getElementById("pwdErr").textContent = "enter a password"; return; }
      const hash = await sha256(pwd);
      if (hash === PWD_HASH) {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("dashContent").style.display = "block";
        loadAll();
      } else {
        unlockAttempts++;
        document.getElementById("pwdErr").textContent = `wrong password (${unlockAttempts})`;
      }
    }

    document.getElementById("pwdInput").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });

    document.querySelectorAll(".section-toggle button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".section-toggle button").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".section-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("panel-" + btn.dataset.section).classList.add("active");
      });
    });

    // === PROFILE ===
    function saveProfile() {
      const data = {
        name: document.getElementById("fName").value,
        tagline: document.getElementById("fTagline").value,
        about: document.getElementById("fAbout").value,
        birthdate: document.getElementById("fBirthdate").value,
      };
      localStorage.setItem("dash_profile", JSON.stringify(data));
      toast("Profile saved");
    }

    // === SKILLS ===
    let skills = [];

    function renderSkillsEditor() {
      const container = document.getElementById("skillsEditor");
      if (!skills.length) { container.innerHTML = '<div class="empty">no skills yet</div>'; return; }
      container.innerHTML = skills.map((s, i) => `
        <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center;">
          <input value="${s.icon}" style="width:50px;margin:0;" placeholder="icon">
          <input value="${s.name}" style="flex:1;margin:0;" placeholder="name">
          <select style="width:120px;margin:0;">
            <option ${s.level==='advanced'?'selected':''}>advanced</option>
            <option ${s.level==='intermediate'?'selected':''}>intermediate</option>
            <option ${s.level==='beginner'?'selected':''}>beginner</option>
          </select>
          <button class="btn btn-danger" onclick="removeSkill(${i})" style="padding:4px 8px;">x</button>
        </div>`).join("");
    }

    function addSkill() {
      skills.push({ icon: "🔧", name: "", level: "intermediate" });
      renderSkillsEditor();
    }

    function removeSkill(i) {
      skills.splice(i, 1);
      renderSkillsEditor();
    }

    function saveSkills() {
      const items = document.querySelectorAll("#skillsEditor > div");
      skills = Array.from(items).map(div => {
        const inputs = div.querySelectorAll("input");
        return { icon: inputs[0].value, name: inputs[1].value, level: div.querySelector("select").value };
      });
      localStorage.setItem("dash_skills", JSON.stringify(skills));
      toast("Skills saved");
    }

    // === NOW ===
    function saveNow() {
      const data = {
        status: document.getElementById("fNowStatus").value,
        note: document.getElementById("fNowNote").value,
      };
      localStorage.setItem("dash_now", JSON.stringify(data));
      toast("Status saved");
    }

    // === BLOG ===
    let blogPosts = [];

    function renderBlogList() {
      const container = document.getElementById("blogList");
      if (!blogPosts.length) { container.innerHTML = '<div class="empty">no posts</div>'; return; }
      container.innerHTML = blogPosts.map((p, i) => `
        <div style="background:#1a1523;border:1px solid rgba(220,200,255,0.08);border-radius:8px;padding:10px 12px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <strong style="font-size:12px;">${p.title}</strong>
            <button class="btn btn-danger" onclick="removeBlogPost(${i})" style="padding:3px 8px;font-size:10px;">x</button>
          </div>
          <div style="font-size:10px;color:rgba(210,195,240,0.45);margin-top:4px;">${p.date || 'just now'}</div>
          <div style="font-size:11px;margin-top:6px;line-height:1.5;">${p.body}</div>
        </div>`).join("");
    }

    function addBlogPost() {
      const title = document.getElementById("fBlogTitle").value.trim();
      const body = document.getElementById("fBlogBody").value.trim();
      if (!title || !body) { toast("enter both title and body"); return; }
      blogPosts.push({ title, body, date: new Date().toLocaleDateString() });
      document.getElementById("fBlogTitle").value = "";
      document.getElementById("fBlogBody").value = "";
      renderBlogList();
      localStorage.setItem("dash_blog", JSON.stringify(blogPosts));
      toast("Post added");
    }

    function removeBlogPost(i) {
      blogPosts.splice(i, 1);
      renderBlogList();
      localStorage.setItem("dash_blog", JSON.stringify(blogPosts));
    }

    // === FRIENDS ===
    let friends = [];

    function renderFriendsEditor() {
      const container = document.getElementById("friendsEditor");
      if (!friends.length) { container.innerHTML = '<div class="empty">no friends</div>'; return; }
      container.innerHTML = friends.map((f, i) => `
        <div style="background:#1a1523;border:1px solid rgba(220,200,255,0.08);border-radius:8px;padding:10px 12px;margin-bottom:8px;">
          <div style="display:flex;gap:8px;margin-bottom:6px;">
            <input value="${f.name}" style="flex:1;margin:0;" placeholder="name" data-f="${i}" class="f-name">
            <input value="${f.username}" style="width:140px;margin:0;" placeholder="@username" data-f="${i}" class="f-user">
            <button class="btn btn-danger" onclick="removeFriend(${i})" style="padding:3px 8px;font-size:10px;">x</button>
          </div>
          <input value="${f.desc || ''}" style="margin:0;" placeholder="description" data-f="${i}" class="f-desc">
        </div>`).join("");
    }

    function addFriend() {
      friends.push({ name: "", username: "", desc: "" });
      renderFriendsEditor();
    }

    function removeFriend(i) {
      friends.splice(i, 1);
      renderFriendsEditor();
    }

    function saveFriends() {
      document.querySelectorAll(".f-name").forEach(el => {
        const i = parseInt(el.dataset.f);
        friends[i].name = el.value;
      });
      document.querySelectorAll(".f-user").forEach(el => {
        const i = parseInt(el.dataset.f);
        friends[i].username = el.value;
      });
      document.querySelectorAll(".f-desc").forEach(el => {
        const i = parseInt(el.dataset.f);
        friends[i].desc = el.value;
      });
      localStorage.setItem("dash_friends", JSON.stringify(friends));
      toast("Friends saved");
    }

    // === LOAD ===
    function loadAll() {
      const profile = JSON.parse(localStorage.getItem("dash_profile"));
      if (profile) {
        document.getElementById("fName").value = profile.name || "adam";
        document.getElementById("fTagline").value = profile.tagline || "17 · dev/designer";
        document.getElementById("fAbout").value = profile.about || "";
        document.getElementById("fBirthdate").value = profile.birthdate || "2008-09-22";
      }
      skills = JSON.parse(localStorage.getItem("dash_skills")) || [];
      renderSkillsEditor();
      const now = JSON.parse(localStorage.getItem("dash_now"));
      if (now) {
        document.getElementById("fNowStatus").value = now.status || "";
        document.getElementById("fNowNote").value = now.note || "";
      }
      blogPosts = JSON.parse(localStorage.getItem("dash_blog")) || [];
      renderBlogList();
      friends = JSON.parse(localStorage.getItem("dash_friends")) || [];
      renderFriendsEditor();
    }

    // Enter triggers save in inputs
    document.addEventListener("keydown", e => {
      if (e.key === "Enter" && e.target.closest("#dashContent")) {
        const section = document.querySelector(".section-panel.active");
        if (!section) return;
        const id = section.id;
        if (id === "panel-profile") saveProfile();
        if (id === "panel-skills") saveSkills();
        if (id === "panel-now") saveNow();
      }
    });
  </script>
</body>
</html>
