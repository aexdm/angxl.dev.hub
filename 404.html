<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — adam.dev</title>
  <link rel="stylesheet" href="index.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
    .error-wrap { text-align: center; }
    .error-code { font-family: var(--serif); font-style: italic; font-size: 96px; font-weight: 300; color: var(--amber); line-height: 1; }
    .error-msg { font-family: var(--mono); font-size: 13px; color: var(--muted); margin: 16px 0 28px; }
    .error-wrap .btn-amber { display: inline-flex; }
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-code">404</div>
    <p class="error-msg">// page not found<br>the universe probably ate it</p>
    <a href="/" class="btn-amber"><i data-lucide="arrow-left"></i> go home</a>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
