<!DOCTYPE html>
<html lang="en" data-default-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adam · Portfolio</title>
  <meta name="description" content="Adam's portfolio. Developer and designer. Personal projects, live dashboard, and more.">
  <meta name="theme-color" content="#0e0c12">
  <link rel="stylesheet" href="gate.css">
  <link rel="stylesheet" href="lang.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="lang-bar" role="group" aria-label="Language / Langue">
    <button class="lang-flag" data-lang="en" onclick="setLang('en')" aria-pressed="false" title="English"><svg class="flag" viewBox="0 0 60 30" preserveAspectRatio="none" aria-hidden="true"><rect width="60" height="30" fill="#012169"/><path d="M0,0 60,30 M60,0 0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 60,30 M60,0 0,30" stroke="#C8102E" stroke-width="3"/><rect x="25" width="10" height="30" fill="#fff"/><rect y="10" width="60" height="10" fill="#fff"/><rect x="27" width="6" height="30" fill="#C8102E"/><rect y="12" width="60" height="6" fill="#C8102E"/></svg><span class="lang-code">EN</span></button>
    <button class="lang-flag" data-lang="fr" onclick="setLang('fr')" aria-pressed="false" title="Français"><svg class="flag" viewBox="0 0 3 2" preserveAspectRatio="none" aria-hidden="true"><rect width="3" height="2" fill="#fff"/><rect width="1" height="2" fill="#0055A4"/><rect x="2" width="1" height="2" fill="#EF4135"/></svg><span class="lang-code">FR</span></button>
  </div>

  <canvas id="gateStars"></canvas>

  <main class="gate-wrap">
    <div class="gate-eyebrow" data-i18n="gate.eyebrow">Welcome</div>
    <h1 class="gate-title">Adam<span>.</span></h1>
    <p class="gate-prompt" data-i18n="gate.prompt">Choose where to go</p>

    <div class="gate-cards">
      <a class="gate-card gate-card--pro" href="https://adamchettouh.fr/pro.html" id="cardPro">
        <span class="gate-card-icon"><i data-lucide="briefcase"></i></span>
        <span class="gate-badge" data-i18n="gate.pro.badge">For recruiters</span>
        <span class="gate-card-title" data-i18n="gate.pro.title">Recruiters' Space</span>
        <span class="gate-card-desc" data-i18n="gate.pro.desc">Professional profile: CV, skills and projects.</span>
        <span class="gate-cta" data-i18n="gate.pro.cta">View the pro profile</span>
      </a>

      <a class="gate-card gate-card--perso" href="https://angxl.pages.dev/perso.html" id="cardPerso">
        <span class="gate-card-icon"><i data-lucide="sparkles"></i></span>
        <span class="gate-badge" data-i18n="gate.perso.badge">Personal version</span>
        <span class="gate-card-title" data-i18n="gate.perso.title">Personal Site</span>
        <span class="gate-card-desc" data-i18n="gate.perso.desc">My creative portfolio: personal projects, a live dashboard and experiments. The original version of the site.</span>
        <span class="gate-cta" data-i18n="gate.perso.cta">Enter</span>
      </a>
    </div>


  </main>

  <script>
  window.I18N = {
    "gate.eyebrow":     { en: "Welcome", fr: "Bienvenue" },
    "gate.prompt":      { en: "Choose where to go", fr: "Choisissez votre espace" },
    "gate.pro.badge":   { en: "For recruiters", fr: "Pour les recruteurs" },
    "gate.pro.title":   { en: "Recruiters' Space", fr: "Espace Recruteurs" },
    "gate.pro.desc":    { en: "Professional profile: CV, skills and projects.", fr: "Profil professionnel : CV, compétences et projets." },
    "gate.pro.cta":     { en: "View the pro profile", fr: "Voir le profil pro" },
    "gate.perso.badge": { en: "Personal version", fr: "Version perso" },
    "gate.perso.title": { en: "Personal Site", fr: "Site Personnel" },
    "gate.perso.desc":  { en: "My creative portfolio: personal projects, a live dashboard and experiments. The original version of the site.", fr: "Mon portfolio créatif : projets persos, dashboard live et expérimentations. La version originale du site." },
    "gate.perso.cta":   { en: "Enter", fr: "Entrer" }
  };
  </script>
  <script src="lang.js"></script>
  <script>
  lucide.createIcons();
  document.addEventListener('langchange', function(){ if (window.lucide) lucide.createIcons(); });
  document.getElementById('cardPro').addEventListener('click', function(e){ e.currentTarget.href = window.langHref('https://adamchettouh.fr/pro.html'); });
  document.getElementById('cardPerso').addEventListener('click', function(e){ e.currentTarget.href = window.langHref('https://angxl.pages.dev/perso.html'); });

  (function(){
    var c = document.getElementById('gateStars'), x = c.getContext('2d'), stars = [];
    function resize(){ c.width = innerWidth; c.height = innerHeight; }
    resize(); addEventListener('resize', resize);
    for (var i=0;i<70;i++) stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.6+0.3,a:Math.random(),s:Math.random()*0.02+0.004});
    function tick(){
      x.clearRect(0,0,c.width,c.height);
      for (var i=0;i<stars.length;i++){ var st=stars[i]; st.a+=st.s; var o=0.3+0.5*Math.abs(Math.sin(st.a));
        x.beginPath(); x.arc(st.x,st.y,st.r,0,7); x.fillStyle='rgba(250,220,180,'+o+')'; x.fill(); }
      requestAnimationFrame(tick);
    }
    tick();
  })();
  </script>
</body>
</html>
